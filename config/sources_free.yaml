# PrismLens 免费版新闻源配置
# 仅包含 10 个核心新闻源，覆盖主要区域
# 完整版（101+ 源）请购买 PrismLens 付费版

# ─────────────────────────────────────────────────
# 抓取策略
# ─────────────────────────────────────────────────
fetch_strategy:
  tier_1_direct_rss:
    priority: 10
    description: "核心源：直接 RSS feed，最高优先级"
    timeout: 20
    max_retries: 3
  tier_2_google_news:
    priority: 6
    description: "补充源：Google News RSS 代理，中等优先级"
    timeout: 15
    max_retries: 2

health_thresholds:
  min_success_rate: 0.3
  cooldown_hours: 24
  max_consecutive_fails: 5

