  UA:
    names: ["乌克兰", "Ukraine"]
    type: country
    alliances: []
    risk_domains: ["俄乌", "能源", "粮食"]

  KP:
    names: ["朝鲜", "North Korea"]
    type: country
    alliances: []
    risk_domains: ["核", "导弹"]

  SA:
    names: ["沙特", "Saudi"]
    type: country
    alliances: ["OPEC"]
    risk_domains: ["能源", "中东"]

  TR:
    names: ["土耳其", "Turkey"]
    type: country
    alliances: ["NATO"]
    risk_domains: ["中东", "航运"]

  AU:
    names: ["澳大利亚", "Australia"]
    type: country
    alliances: ["NATO伙伴", "五眼联盟", "QUAD"]
