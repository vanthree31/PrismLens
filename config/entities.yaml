# 实体注册表 (Entities Registry)
# 用于事件 ID 生成、实体提取、参与者追踪
#
# 格式: code -> {names: [别名列表], type, alliances, risk_domains}
# names 中第一个为主名，其余为别名（中英文均可）

entities:
  # ─── 国家 ───
  US:
    names: ["美国", "United States", "US", "America", "Washington"]
    type: country
    alliances: ["NATO", "五眼联盟"]
    risk_domains: ["军事", "金融", "科技"]

  CN:
    names: ["中国", "China", "Beijing"]
    type: country
    alliances: ["BRICS"]
    risk_domains: ["台海", "科技", "贸易"]

  RU:
    names: ["俄罗斯", "Russia", "Moscow"]
    type: country
    alliances: ["CSTO"]
    risk_domains: ["能源", "军事", "核"]

  IR:
    names: ["伊朗", "Iran", "Tehran"]
    type: country
    alliances: ["抵抗轴心"]
    risk_domains: ["中东", "能源", "核"]

  IL:
    names: ["以色列", "Israel"]
    type: country
    alliances: ["美国"]
    risk_domains: ["中东", "军事"]

  JP:
    names: ["日本", "Japan"]
    type: country
    alliances: ["NATO伙伴", "五眼联盟"]
    risk_domains: ["半导体", "亚太"]

  KR:
    names: ["韩国", "South Korea", "Korea"]
    type: country
    alliances: ["美国"]
    risk_domains: ["半导体", "亚太"]

  IN:
    names: ["印度", "India"]
    type: country
    alliances: ["BRICS", "QUAD"]
    risk_domains: ["能源", "贸易"]

  EU:
    names: ["欧盟", "European Union", "EU"]
    type: organization
    alliances: ["NATO"]
    risk_domains: ["金融", "贸易", "气候"]

  UK:
    names: ["英国", "Britain", "United Kingdom", "UK"]
    type: country
    alliances: ["NATO", "五眼联盟"]
    risk_domains: ["金融", "军事"]

  DE:
    names: ["德国", "Germany"]
    type: country
    alliances: ["NATO", "EU"]
    risk_domains: ["能源", "工业"]

  FR:
    names: ["法国", "France"]
