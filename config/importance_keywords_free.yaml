# ═══════════════════════════════════════════════════
# 信号等级定义
# ═══════════════════════════════════════════════════
signal_levels:
  S:
    name: "全球战略级变化"
    description: "多国政府参与、金融市场剧烈波动、军事/能源重大变化"
    threshold: 80
  A:
    name: "重大区域风险"
    description: "区域政府介入、制裁/出口管制升级、军事部署变化"
    threshold: 60
  B:
    name: "持续观察信号"
    description: "多媒体报道、趋势性变化、尚未升级"
    threshold: 35
  C:
    name: "短期噪音"
    description: "单一来源、情绪性报道、无实质政策变化"
    threshold: 0

